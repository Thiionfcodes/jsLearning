<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Pesquisa</title>
</head>
<body>
    <h1>Formulário de Pesquisa</h1>
    <label for="nome">Nome:</label><br>
    <input type="text" id="nome" placeholder="Digite seu nome" required><br><br>
    <label for="idade">Idade:</label><br>
    <input type="number" id="idade" placeholder="Digite sua idade" required><br><br>
    <label for="email">Email:</label><br>
    <input type="email" id="email" placeholder="Digite seu email" required><br><br>
    <label for="profissao">Profissão:</label><br>
    <input type="text" id="profissao" placeholder="Digite sua profissão" required><br><br>
    <label for="tipoProduto">Tipo de produto:</label><br>
    <select id="tipoProduto">
        <option value="perfume">Perfume</option>
        <option value="bodysplash">Bodysplash</option>
        <option value="maquiagem">Maquiagem</option>
    </select><br><br>
    <label for="feedback">Feedback:</label><br>
    <textarea id="feedback" rows="5" cols="30" required></textarea><br>

    <button id="button">Enviar</button>

    <div id="respFormulario" style="display: none;">
        <h2>Informações do usuário</h2>
        <p>Nome: <span id="respNome"></span></p>
        <p>Idade: <span id="respIdade"></span></p>
        <p>Email: <span id="respEmail"></span></p>
        <p>Profissão: <span id="respProfissao"></span></p>
        <p>Feedback do <span id="respProduto"></span>: <span id="respFeedback"></span></p>
    </div>
    <script src="formulario.js"></script>
</body>
</html>
